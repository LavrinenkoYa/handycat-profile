<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HandyCat — Генератор карточек</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 24px 16px; }

    .container { max-width: 700px; margin: 0 auto; }

    h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }

    .card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 1px solid #eee; }
    .card-title { font-size: 13px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; color: #555; font-weight: 500; }
    .form-group input, .form-group select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #111;
      background: #fff;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: #185FA5; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #185FA5; color: #fff; width: 100%; justify-content: center; font-size: 15px; padding: 14px; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-success { background: #1D9E75; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .status.info { background: #E6F1FB; color: #185FA5; display: block; }
    .status.success { background: #E1F5EE; color: #0F6E56; display: block; }
    .status.error { background: #FCEBEB; color: #A32D2D; display: block; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: #888; font-weight: 600; border-bottom: 1px solid #eee; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 10px 12px; border-bottom: 1px solid #f5f5f5; color: #333; }
    tr:last-child td { border-bottom: none; }

    .token-cell { font-family: monospace; font-size: 12px; color: #185FA5; }
    .url-cell { font-family: monospace; font-size: 11px; color: #666; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-pending { background: #FAEEDA; color: #854F0B; }
    .badge-saved { background: #E1F5EE; color: #0F6E56; }
    .badge-error { background: #FCEBEB; color: #A32D2D; }

    .actions-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

    .progress-bar { height: 4px; background: #eee; border-radius: 2px; margin: 12px 0; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: #185FA5; border-radius: 2px; transition: width 0.3s; width: 0%; }

    .empty-state { text-align: center; padding: 32px; color: #aaa; font-size: 14px; }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🪪 Генератор NFC карточек</h1>
  <p class="subtitle">Создайте пачку карточек и передайте ссылки подрядчику</p>

  <div class="card">
    <div class="card-title">Настройки</div>
    <div class="form-row">
      <div class="form-group">
        <label>ID компании</label>
        <input type="text" id="companyId" placeholder="company001" value="company001" />
      </div>
      <div class="form-group">
        <label>Кол-во карточек</label>
        <input type="number" id="count" placeholder="10" min="1" max="500" value="10" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Базовый URL сайта</label>
        <input type="text" id="baseUrl" placeholder="https://project-2i6ok.vercel.app" value="https://project-2i6ok.vercel.app" />
      </div>
      <div class="form-group">
        <label>Префикс токена (опционально)</label>
        <input type="text" id="prefix" placeholder="hc" value="hc" />
      </div>
    </div>
    <div id="status" class="status"></div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <button class="btn btn-primary" id="generateBtn" onclick="generate()">
      ⚡ Сгенерировать карточки
    </button>
  </div>

  <div class="card" id="resultsCard" style="display:none;">
    <div class="card-title">Сгенерированные карточки (<span id="totalCount">0</span>)</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Токен</th>
            <th>URL для карточки</th>
            <th>Firebase</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="actions-row">
      <button class="btn btn-success" onclick="saveToFirebase()">💾 Сохранить в Firebase</button>
      <button class="btn btn-secondary" onclick="exportCSV()">📥 Скачать CSV для подрядчика</button>
      <button class="btn btn-secondary" onclick="copyAllUrls()">📋 Скопировать все URL</button>
    </div>
  </div>
</div>

<script>
  var PROJECT_ID = "handycat-98416";
  var API_KEY = "AIzaSyAdDK2mL3DVhp1We0JO38KU44EOLnS4a7U";
  var BASE = "https://firestore.googleapis.com/v1/projects/" + PROJECT_ID + "/databases/(default)/documents";

  var cards = [];

  function randomToken(prefix) {
    var chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    var token = prefix ? prefix + "-" : "";
    for (var i = 0; i < 8; i++) {
      token += chars[Math.floor(Math.random() * chars.length)];
    }
    return token;
  }

  function generate() {
    var companyId = document.getElementById("companyId").value.trim();
    var count = parseInt(document.getElementById("count").value);
    var baseUrl = document.getElementById("baseUrl").value.trim().replace(/\/$/, "");
    var prefix = document.getElementById("prefix").value.trim();

    if (!companyId || !count || !baseUrl) {
      showStatus("Заполните все обязательные поля", "error");
      return;
    }
    if (count > 500) { showStatus("Максимум 500 карточек за раз", "error"); return; }

    cards = [];
    var usedTokens = {};

    for (var i = 0; i < count; i++) {
      var token;
      do { token = randomToken(prefix); } while (usedTokens[token]);
      usedTokens[token] = true;

      cards.push({
        index: i + 1,
        token: token,
        url: baseUrl + "/c/" + token,
        companyId: companyId,
        status: "unassigned",
        firebaseStatus: "pending"
      });
    }

    renderTable();
    document.getElementById("resultsCard").style.display = "block";
    document.getElementById("totalCount").textContent = cards.length;
    showStatus("Сгенерировано " + cards.length + " токенов. Нажмите «Сохранить в Firebase» чтобы записать в базу.", "info");
  }

  function renderTable() {
    var tbody = document.getElementById("tableBody");
    tbody.innerHTML = cards.map(function(c) {
      var badge = c.firebaseStatus === "saved"
        ? '<span class="badge badge-saved">✓ Сохранено</span>'
        : c.firebaseStatus === "error"
        ? '<span class="badge badge-error">Ошибка</span>'
        : '<span class="badge badge-pending">Ожидание</span>';
      return '<tr>' +
        '<td>' + c.index + '</td>' +
        '<td class="token-cell">' + c.token + '</td>' +
        '<td class="url-cell" title="' + c.url + '">' + c.url + '</td>' +
        '<td>' + badge + '</td>' +
      '</tr>';
    }).join("");
  }

  async function saveToFirebase() {
    if (cards.length === 0) return;

    showStatus("Сохраняем в Firebase...", "info");
    document.getElementById("progressBar").style.display = "block";

    var saved = 0;
    var errors = 0;

    for (var i = 0; i < cards.length; i++) {
      var card = cards[i];
      try {
        var body = {
          fields: {
            companyId: { stringValue: card.companyId },
            status: { stringValue: "unassigned" },
            clientId: { stringValue: "" },
            createdAt: { stringValue: new Date().toISOString() }
          }
        };

        var res = await fetch(BASE + "/nfc_cards/" + card.token + "?key=" + API_KEY, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        if (res.ok) {
          card.firebaseStatus = "saved";
          saved++;
        } else {
          card.firebaseStatus = "error";
          errors++;
        }
      } catch(e) {
        card.firebaseStatus = "error";
        errors++;
      }

      var progress = Math.round(((i + 1) / cards.length) * 100);
      document.getElementById("progressFill").style.width = progress + "%";
      renderTable();
    }

    if (errors === 0) {
      showStatus("✅ Все " + saved + " карточек сохранены в Firebase!", "success");
    } else {
      showStatus("Сохранено: " + saved + ", ошибок: " + errors, "error");
    }
  }

  function exportCSV() {
    if (cards.length === 0) return;
    var rows = ["№,Токен,URL для NFC карточки,Компания,Статус"];
    cards.forEach(function(c) {
      rows.push([c.index, c.token, c.url, c.companyId, c.firebaseStatus].join(","));
    });
    var csv = rows.join("\n");
    var blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    var link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "handycat-cards-" + new Date().toISOString().slice(0, 10) + ".csv";
    link.click();
  }

  function copyAllUrls() {
    if (cards.length === 0) return;
    var urls = cards.map(function(c) { return c.url; }).join("\n");
    navigator.clipboard.writeText(urls).then(function() {
      showStatus("Все URL скопированы в буфер обмена!", "success");
    });
  }

  function showStatus(msg, type) {
    var el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status " + type;
  }
</script>
</body>
</html>
